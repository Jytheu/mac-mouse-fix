name: Build Mac Mouse Fix

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project "Mouse Fix.xcodeproj" \
            -scheme "App" \
            -configuration Release \
            -derivedDataPath "$GITHUB_WORKSPACE/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | tee build.log
          grep -q "BUILD SUCCEEDED" build.log

      - name: Ad-hoc sign
        run: |
          APP="$GITHUB_WORKSPACE/build/Build/Products/Release/Mac Mouse Fix.app"
          HELPER="$APP/Contents/Library/LoginItems/Mac Mouse Fix Helper.app"
          HELPER_ENT="$GITHUB_WORKSPACE/Helper/SupportFiles/Helper.entitlements"
          APP_ENT="$GITHUB_WORKSPACE/App/SupportFiles/App.entitlements"

          find "$APP" -type f -name "*.dylib" | while read f; do
            codesign --force --sign - "$f" 2>/dev/null || true
          done
          find "$APP" -type d -name "*.framework" | while read f; do
            codesign --force --deep --sign - "$f" 2>/dev/null || true
          done

          codesign --force --sign - --entitlements "$HELPER_ENT" "$HELPER"
          codesign --force --sign - --entitlements "$APP_ENT" "$APP"

          echo "--- Verify Helper ---"
          codesign -dv --entitlements - "$HELPER"
          echo "--- Verify App ---"
          codesign -dv --entitlements - "$APP"

      - name: Package
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "$GITHUB_WORKSPACE/build/Build/Products/Release/Mac Mouse Fix.app" \
            "$GITHUB_WORKSPACE/MacMouseFix-patched.zip"

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: MacMouseFix-patched
          path: MacMouseFix-patched.zip

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
