name: Build Mac Mouse Fix

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project "Mouse Fix.xcodeproj" \
            -scheme "App" \
            -configuration Release \
            -derivedDataPath "$GITHUB_WORKSPACE/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | tee build.log
          grep -q "BUILD SUCCEEDED" build.log

      - name: Ad-hoc sign with entitlements
        run: |
          APP="$GITHUB_WORKSPACE/build/Build/Products/Release/Mac Mouse Fix.app"
          HELPER="$APP/Contents/Library/LoginItems/Mac Mouse Fix Helper.app"
          HELPER_BIN="$HELPER/Contents/MacOS/Mac Mouse Fix Helper"
          MAIN_BIN="$APP/Contents/MacOS/Mac Mouse Fix"

          # Extract entitlements embedded in the binaries at compile time
          # (Xcode embeds them even when code signing is disabled)
          extract_entitlements() {
            local bin="$1"
            local out="$2"
            # Try extracting from __TEXT,__entitlements section
            xcrun segedit "$bin" -extract __TEXT __entitlements "$out" 2>/dev/null || \
            codesign -d --entitlements "$out" "$bin" 2>/dev/null || \
            echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict></dict></plist>' > "$out"
          }

          extract_entitlements "$HELPER_BIN" /tmp/helper-entitlements.plist
          extract_entitlements "$MAIN_BIN" /tmp/main-entitlements.plist

          echo "--- Helper entitlements ---"
          cat /tmp/helper-entitlements.plist || echo "(empty)"
          echo "--- Main entitlements ---"
          cat /tmp/main-entitlements.plist || echo "(empty)"

          # Sign frameworks and dylibs first
          find "$APP" -type f -name "*.dylib" | while read f; do
            codesign --force --sign - "$f" 2>/dev/null || true
          done
          find "$APP" -type d -name "*.framework" | while read f; do
            codesign --force --deep --sign - "$f" 2>/dev/null || true
          done

          # Sign helper with its entitlements
          codesign --force --sign - --entitlements /tmp/helper-entitlements.plist "$HELPER"

          # Sign main app with its entitlements
          codesign --force --sign - --entitlements /tmp/main-entitlements.plist "$APP"

          echo "--- Verify ---"
          codesign -dv --entitlements - "$HELPER"
          codesign -dv --entitlements - "$APP"

      - name: Package
        run: |
          cd "$GITHUB_WORKSPACE/build/Build/Products/Release"
          zip -qr "$GITHUB_WORKSPACE/MacMouseFix-patched.zip" "Mac Mouse Fix.app"

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: MacMouseFix-patched
          path: MacMouseFix-patched.zip

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
