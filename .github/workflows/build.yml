name: Build Mac Mouse Fix
on:
  push:
    branches: [master]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project "Mouse Fix.xcodeproj" \
            -scheme "App" \
            -configuration Release \
            -derivedDataPath "$GITHUB_WORKSPACE/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | tee build.log
          grep -q "BUILD SUCCEEDED" build.log
      - name: Import signing certificate
        run: |
          echo "${{ secrets.CERTIFICATE_P12 }}" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "${{ secrets.CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Sign with Developer ID
        run: |
          APP="$GITHUB_WORKSPACE/build/Build/Products/Release/Mac Mouse Fix.app"
          HELPER="$APP/Contents/Library/LoginItems/Mac Mouse Fix Helper.app"
          IDENTITY="${{ secrets.SIGNING_IDENTITY }}"

          find "$APP" -type f -name "*.dylib" | while read f; do
            codesign --force --sign "$IDENTITY" "$f" 2>/dev/null || true
          done
          find "$APP" -type d -name "*.framework" | while read f; do
            codesign --force --deep --sign "$IDENTITY" "$f" 2>/dev/null || true
          done
          codesign --force --deep --sign "$IDENTITY" "$HELPER"
          codesign --force --deep --sign "$IDENTITY" "$APP"
          echo "Signing done"
          codesign --verify --verbose "$APP" || true
      - name: Package
        run: |
          APP="$GITHUB_WORKSPACE/build/Build/Products/Release/Mac Mouse Fix.app"
          cd "$GITHUB_WORKSPACE/build/Build/Products/Release"
          zip -qr "$GITHUB_WORKSPACE/MacMouseFix-patched.zip" "Mac Mouse Fix.app"
      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: MacMouseFix-patched
          path: MacMouseFix-patched.zip
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
