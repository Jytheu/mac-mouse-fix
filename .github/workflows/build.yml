name: Build Mac Mouse Fix

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project "Mouse Fix.xcodeproj" \
            -scheme "App" \
            -configuration Release \
            -derivedDataPath "$GITHUB_WORKSPACE/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | tee build.log
          grep -q "BUILD SUCCEEDED" build.log

      - name: Upload app
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MacMouseFix-patched
          path: build/Build/Products/Release/*.app

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
