name: Build Mac Mouse Fix
on:
  push:
    branches: [master]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project "Mouse Fix.xcodeproj" \
            -scheme "App" \
            -configuration Release \
            -derivedDataPath "$GITHUB_WORKSPACE/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | tee build.log
          grep -q "BUILD SUCCEEDED" build.log
      - name: Ad-hoc sign
        run: |
          APP="$GITHUB_WORKSPACE/build/Build/Products/Release/Mac Mouse Fix.app"
          find "$APP" -type f \( -name "*.dylib" -o -name "*.framework" \) | while read f; do
            codesign --force --deep --sign - "$f" 2>/dev/null || true
          done
          find "$APP/Contents" -type f -perm +0111 | while read f; do
            codesign --force --sign - "$f" 2>/dev/null || true
          done
          HELPER="$APP/Contents/Library/LoginItems/Mac Mouse Fix Helper.app"
          codesign --force --deep --sign - "$HELPER"
          codesign --force --deep --sign - "$APP"
          echo "Signing done"
          codesign --verify --verbose "$APP" || true
          codesign --verify --verbose "$HELPER" || true
      - name: Package
        run: |
          APP="$GITHUB_WORKSPACE/build/Build/Products/Release/Mac Mouse Fix.app"
          cd "$GITHUB_WORKSPACE/build/Build/Products/Release"
          zip -qr "$GITHUB_WORKSPACE/MacMouseFix-patched.zip" "Mac Mouse Fix.app"
      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: MacMouseFix-patched
          path: MacMouseFix-patched.zip
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
